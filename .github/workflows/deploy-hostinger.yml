name: Deploy to Hostinger via FTP

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    name: Deploy site via FTP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync files to Hostinger (FTP)
        uses: SamKirkland/FTP-Deploy-Action@4.4.0
        with:
          server: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          password: ${{ secrets.HOSTINGER_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: ./
          server-dir: ${{ secrets.HOSTINGER_REMOTE_DIR }}
          git-ftp-args: --insecure

      - name: Deployment finished
        run: echo "Deployment to Hostinger complete"
