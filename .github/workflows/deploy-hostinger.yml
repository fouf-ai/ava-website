name: Deploy to Hostinger via FTP

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    name: Deploy site via FTP
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTP
        env:
          FTP_HOST: ${{ secrets.HOSTINGER_HOST }}
          FTP_USER: ${{ secrets.HOSTINGER_USER }}
          FTP_PASS: ${{ secrets.HOSTINGER_PASSWORD }}
          FTP_DIR: ${{ secrets.HOSTINGER_REMOTE_DIR }}
        run: |
          lftp -u "$FTP_USER,$FTP_PASS" "ftp://$FTP_HOST" -e "
            set ftp:ssl-allow no;
            set ssl:verify-certificate no;
            set ftp:passive-mode yes;
            set net:timeout 60;
            set net:max-retries 5;
            set net:reconnect-interval-base 10;
            mirror --reverse --delete --parallel=2 --exclude-glob .git --exclude-glob .github ./ $FTP_DIR;
            quit
          "

      - name: Deployment finished
        run: echo "Deployment to Hostinger complete"
