name: Deploy to Hostinger via FTP

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    name: Deploy site via FTP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTP
        run: |
          lftp -e "
            set ftp:ssl-allow no;
            set ssl:verify-certificate no;
            open ftp://${{ secrets.HOSTINGER_HOST }};
            user ${{ secrets.HOSTINGER_USER }} ${{ secrets.HOSTINGER_PASSWORD }};
            mirror --reverse --delete --verbose --parallel=5 ./ ${{ secrets.HOSTINGER_REMOTE_DIR }};
            quit
          "

      - name: Deployment finished
        run: echo "Deployment to Hostinger complete"
