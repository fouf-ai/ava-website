name: Deploy to Hostinger via FTP

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    name: Deploy site via FTP
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via FTP
        env:
          FTP_HOST: ${{ secrets.HOSTINGER_HOST }}
          FTP_USER: ${{ secrets.HOSTINGER_USER }}
          FTP_PASS: ${{ secrets.HOSTINGER_PASSWORD }}
          FTP_DIR: ${{ secrets.HOSTINGER_REMOTE_DIR }}
        run: python3 scripts/ftp_deploy.py

      - name: Deployment finished
        run: echo "Deployment complete — site live on africanvisionaries.org"
